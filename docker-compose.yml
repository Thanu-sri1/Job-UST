services:
  mongo-auth:
    image: mongo:7-jammy
    container_name: mongo-auth
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: auth-db
    volumes:
      - mongo_auth_data:/data/db
    expose:
      - "27017"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  mongo-user:
    image: mongo:7-jammy
    container_name: mongo-user
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: user-db
    volumes:
      - mongo_user_data:/data/db
    expose:
      - "27017"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  mongo-task:
    image: mongo:7-jammy
    container_name: mongo-task
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: task-db
    volumes:
      - mongo_task_data:/data/db
    expose:
      - "27017"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  seeder:
    image: node:20-alpine
    container_name: seeder
    working_dir: /scripts
    volumes:
      - ./scripts:/scripts
    environment:
      AUTH_MONGODB_URI: mongodb://mongo-auth:27017/auth-db
      USER_MONGODB_URI: mongodb://mongo-user:27017/user-db
      TASK_MONGODB_URI: mongodb://mongo-task:27017/task-db
    command: sh -c "npm ci --silent && node seed.js"
    depends_on:
      mongo-auth:
        condition: service_healthy
      mongo-user:
        condition: service_healthy
      mongo-task:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  auth-service:
    build:
      context: ./src/services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    env_file:
      - ./src/services/auth-service/.env
    environment:
      PORT: "3001"
      MONGODB_URI: mongodb://mongo-auth:27017/auth-db
      ALLOWED_ORIGINS: http://localhost,http://localhost:80
    expose:
      - "3001"
    depends_on:
      mongo-auth:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  user-service:
    build:
      context: ./src/services/user-service
      dockerfile: Dockerfile
    container_name: user-service
    restart: unless-stopped
    env_file:
      - ./src/services/user-service/.env
    environment:
      PORT: "3002"
      MONGODB_URI: mongodb://mongo-user:27017/user-db
      ALLOWED_ORIGINS: http://localhost,http://localhost:80
    expose:
      - "3002"
    depends_on:
      mongo-user:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  task-service:
    build:
      context: ./src/services/task-service
      dockerfile: Dockerfile
    container_name: task-service
    restart: unless-stopped
    env_file:
      - ./src/services/task-service/.env
    environment:
      PORT: "3003"
      MONGODB_URI: mongodb://mongo-task:27017/task-db
      ALLOWED_ORIGINS: http://localhost,http://localhost:80
    expose:
      - "3003"
    depends_on:
      mongo-task:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  api-gateway:
    build:
      context: ./src/services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    env_file:
      - ./src/services/api-gateway/.env
    environment:
      PORT: "3000"
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      TASK_SERVICE_URL: http://task-service:3003
      ALLOWED_ORIGINS: http://localhost,http://localhost:80
    expose:
      - "3000"
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      task-service:
        condition: service_healthy
    networks:
      - internal
      - public
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - public
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  mongo_auth_data:
  mongo_user_data:
  mongo_task_data:

networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge
